parent=keycloak.v2
import=common/keycloak

# Turnstile: o `sitekey` e mensagens sao injetados pelo Authenticator via `LoginFormsProvider.setAttribute`.
# Este tema so renderiza o widget.

# Necessário para o Turnstile renderizar (ele usa iframe em challenges.cloudflare.com).
contentSecurityPolicy=frame-src 'self' https://challenges.cloudflare.com; frame-ancestors 'self'; object-src 'none';
