name: Processar fotos pendentes

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'uploads/pendentes/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  process-uploads:
    name: Otimizar fotos e atualizar mapa local
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout do PR
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.ACTIONS_BYPASS_TOKEN }}
          persist-credentials: false

      - name: Checkout manual
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_BYPASS_TOKEN }}
          persist-credentials: false

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Testar fluxo de processamento
        run: npm run test:uploads

      - name: Processar fotos pendentes
        run: npm run process:uploads

      - name: Comitar arquivos processados
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Nada para comitar."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${{ secrets.ACTIONS_BYPASS_TOKEN }}@github.com/${{ github.repository }}.git"
          git add public/images/galeria src/localAssetsLoader.js uploads/pendentes
          git commit -m "Process pending gallery uploads"
          git push origin "HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}"

      - name: Habilitar auto-merge apos checks verdes
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_BYPASS_TOKEN }}
        run: |
          pr_number="${{ github.event.pull_request.number }}"

          if gh pr merge "$pr_number" \
            --repo "${{ github.repository }}" \
            --auto \
            --merge \
            --delete-branch; then
            echo "Auto-merge habilitado com sucesso."
            exit 0
          fi

          echo "::warning::Nao foi possivel habilitar auto-merge. Tentando merge direto (admin) para publicar automaticamente."

          if gh pr merge "$pr_number" \
            --repo "${{ github.repository }}" \
            --admin \
            --merge \
            --delete-branch; then
            echo "Merge direto concluido."
            exit 0
          fi

          echo "::warning::Nao foi possivel fazer merge automatico. O PR continuara aberto para merge manual."
