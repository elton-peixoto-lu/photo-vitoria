name: Processar fotos pendentes

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'uploads/pendentes/**'
      - 'uploads/manifests/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  PROJECT_ID: fotovitoria
  IMAGE_WORKER_URL: ${{ secrets.IMAGE_WORKER_URL }}

jobs:
  process-uploads:
    name: Otimizar fotos e atualizar mapa local
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout do PR
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.ACTIONS_BYPASS_TOKEN }}
          persist-credentials: false

      - name: Checkout manual
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_BYPASS_TOKEN }}
          persist-credentials: false

      - name: Validar escopo do PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_BYPASS_TOKEN }}
        run: |
          set -euo pipefail
          pr_number="${{ github.event.pull_request.number }}"
          head_ref="${{ github.event.pull_request.head.ref }}"
          changed_files=$(gh pr view "$pr_number" --repo "${{ github.repository }}" --json files --jq '.files[].path')

          if [ -z "$changed_files" ]; then
            echo "::error::PR sem arquivos alterados."
            exit 1
          fi

          while IFS= read -r file; do
            case "$file" in
              uploads/pendentes/*|uploads/manifests/*) ;;
              .github/workflows/process-pending-uploads.yml|.github/workflows/deploy-image-worker.yml|scripts/processPendingUploads.mjs|scripts/processPendingUploads.test.mjs|scripts/processManifestWorker.mjs|Dockerfile.image-worker|backend/*|backend/*/*|backend/*/*/*|backend/*/*/*/*)
                case "$head_ref" in
                  gallery-upload/*) ;;
                  *)
                    echo "::error::Arquivo fora do escopo permitido: $file"
                    exit 1
                    ;;
                esac
                ;;
              *)
                echo "::error::Arquivo fora do escopo permitido: $file"
                exit 1
                ;;
            esac
          done <<EOF
          $changed_files
          EOF

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set active GCP project
        run: gcloud config set project ${{ env.PROJECT_ID }}

      - name: Testar fluxo de processamento
        run: npm run test:uploads

      - name: Processar fotos pendentes
        if: env.IMAGE_WORKER_URL == ''
        env:
          REQUIRE_WATERMARK: "true"
          WATERMARK_LOGO_PATH: assets/watermark-logo.svg
        run: npm run process:uploads

      - name: Processar manifestos via image worker
        if: env.IMAGE_WORKER_URL != ''
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_BYPASS_TOKEN }}
          IMAGE_WORKER_TOKEN: ${{ secrets.IMAGE_WORKER_TOKEN }}
        run: |
          set -euo pipefail

          head_ref="${{ github.event.pull_request.head.ref || github.ref_name }}"
          repo="${{ github.repository }}"

          mapfile -t manifests < <(find uploads/manifests -type f -name '*.json' | sort)
          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "Nenhum manifesto pendente encontrado."
            exit 0
          fi

          for manifest_path in "${manifests[@]}"; do
            echo "Processando ${manifest_path} pelo worker..."
            payload="$(
              jq -cn \
                --arg repo "$repo" \
                --arg branch "$head_ref" \
                --arg manifestPath "$manifest_path" \
                --slurpfile manifest "$manifest_path" \
                '{repo:$repo, branch:$branch, manifestPath:$manifestPath, manifest:$manifest[0]}'
            )"

            curl --fail-with-body --silent --show-error \
              -X POST "${IMAGE_WORKER_URL}/process-manifest" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${IMAGE_WORKER_TOKEN}" \
              -d "$payload"
            echo
          done

      - name: Comitar arquivos processados
        if: env.IMAGE_WORKER_URL == ''
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Nada para comitar."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${{ secrets.ACTIONS_BYPASS_TOKEN }}@github.com/${{ github.repository }}.git"
          git add public/images/galeria src/localAssetsLoader.js uploads/pendentes uploads/manifests
          git commit -m "Process pending gallery uploads"
          git push origin "HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}"

      - name: Habilitar auto-merge apos checks verdes
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_BYPASS_TOKEN }}
        run: |
          set -euo pipefail
          pr_number="${{ github.event.pull_request.number }}"
          head_ref="${{ github.event.pull_request.head.ref }}"

          if gh pr merge "$pr_number" \
            --repo "${{ github.repository }}" \
            --auto \
            --merge \
            --delete-branch; then
            echo "Auto-merge habilitado com sucesso."
            exit 0
          fi

          case "$head_ref" in
            gallery-upload/*)
              echo "::warning::Auto-merge indisponivel. Executando merge direto apenas para branch segura do portal."
              gh pr merge "$pr_number" \
                --repo "${{ github.repository }}" \
                --merge \
                --delete-branch
              ;;
            *)
              echo "::warning::Nao foi possivel habilitar auto-merge. O PR continuara aberto para merge manual."
              ;;
          esac
