name: Deploy Admin Panel to Cloud Run

on:
  push:
    branches: [master]
    paths:
      - 'admin-new/**'
      - 'server/**'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: fotovitoria
  REGION: us-central1
  SERVICE_NAME: photo-vitoria-admin-panel
  API_SERVICE_NAME: photo-vitoria-admin-api
  ADMIN_API_SERVICE_ACCOUNT: photo-vitoria-admin-api@fotovitoria.iam.gserviceaccount.com
  UPLOAD_TEMP_BUCKET: photo-vitoria-upload-temp

jobs:
  deploy-panel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Select target project
        run: gcloud config set project ${{ env.PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Admin Panel
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/photo-vitoria/${{ env.SERVICE_NAME }}:${{ github.sha }} ./admin-new
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/photo-vitoria/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/photo-vitoria/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }},VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }},VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }},VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }},VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }},VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }},VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }},VITE_ADMIN_API_URL=${{ secrets.VITE_ADMIN_API_URL }}"

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Select target project
        run: gcloud config set project ${{ env.PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Admin API
        run: |
          docker build -f Dockerfile.admin-api -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/photo-vitoria/${{ env.API_SERVICE_NAME }}:${{ github.sha }} .
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/photo-vitoria/${{ env.API_SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE_NAME }} \
            --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/photo-vitoria/${{ env.API_SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --service-account ${{ env.ADMIN_API_SERVICE_ACCOUNT }} \
            --allow-unauthenticated \
            --set-secrets="GITHUB_UPLOAD_TOKEN=photo-vitoria-github-upload-token:latest,TURNSTILE_SECRET_KEY=photo-vitoria-turnstile-secret:latest" \
            --set-env-vars="GITHUB_REPO=elton-peixoto-lu/photo-vitoria,GITHUB_BASE_BRANCH=master,ADMIN_ALLOWED_ORIGINS=https://estudiovitoriafreitas.com.br\,https://www.estudiovitoriafreitas.com.br,ADMIN_ALLOWED_EMAILS=pluizelton@gmail.com\,estudiovitoriafreitas@gmail.com,UPLOAD_TEMP_BUCKET=${{ env.UPLOAD_TEMP_BUCKET }},FIREBASE_AUTH_PROJECT_ID=photo-vitoria,SIGNED_UPLOAD_URL_EXPIRATION_SECONDS=900"
