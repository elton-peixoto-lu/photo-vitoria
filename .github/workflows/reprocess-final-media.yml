name: Reprocess Final Media Watermark

on:
  push:
    branches: [master]
    paths:
      - 'assets/watermark-logo.png'
      - 'backend/**'
      - 'scripts/reprocessPublishedGalleryWatermark.mjs'
      - '.github/workflows/deploy-image-worker.yml'
      - '.github/workflows/reprocess-final-media.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE_WORKER_URL: https://photo-vitoria-image-worker-rxpgnk6khq-uc.a.run.app

jobs:
  reprocess-media:
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: photo-vitoria-admin-api@fotovitoria.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Wait for worker deployment to be ready
        run: |
          for attempt in $(seq 1 40); do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.IMAGE_WORKER_URL }}/healthz")
            if [ "$status_code" = "200" ]; then
              echo "Worker respondeu healthz."
              exit 0
            fi
            echo "Aguardando worker ficar pronto (tentativa $attempt)..."
            sleep 15
          done
          echo "Worker nao ficou pronto a tempo."
          exit 1

      - name: Trigger final media reprocess
        run: |
          IDENTITY_TOKEN="$(gcloud auth print-identity-token --audiences=${{ env.IMAGE_WORKER_URL }})"
          response="$(curl -sS -w '\n%{http_code}' \
            -X POST "${{ env.IMAGE_WORKER_URL }}/reprocess-published-media" \
            -H "Authorization: Bearer ${IDENTITY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}')"
          body="$(printf '%s' "$response" | sed '$d')"
          status_code="$(printf '%s' "$response" | tail -n1)"
          printf '%s\n' "$body"
          test "$status_code" = "200"
