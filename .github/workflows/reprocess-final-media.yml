name: Reprocess Final Media Watermark

on:
  push:
    branches: [master]
    paths:
      - 'assets/watermark-logo.png'
      - 'scripts/reprocessPublishedGalleryWatermark.mjs'
      - 'scripts/generateGalleryIndex.mjs'
      - '.github/workflows/reprocess-final-media.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: fotovitoria
  FINAL_MEDIA_BUCKET: photo-vitoria-gallery-prod

jobs:
  reprocess-media:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Select target project
        run: gcloud config set project "${{ env.PROJECT_ID }}"

      - name: Download published gallery from GCS
        run: |
          mkdir -p public/images/galeria
          gcloud storage rsync --recursive "gs://${{ env.FINAL_MEDIA_BUCKET }}/images/galeria" "./public/images/galeria"

      - name: Reprocess gallery watermark locally
        run: node scripts/reprocessPublishedGalleryWatermark.mjs

      - name: Regenerate gallery index
        run: node scripts/generateGalleryIndex.mjs "./public/images/galeria" "./gallery-index.json"

      - name: Validate gallery index before upload
        run: node scripts/validateGalleryIndexFile.mjs "./public/images/galeria" "./gallery-index.json"

      - name: Upload processed gallery to GCS
        run: |
          gcloud storage rsync --recursive "./public/images/galeria" "gs://${{ env.FINAL_MEDIA_BUCKET }}/images/galeria"
          gcloud storage cp "./gallery-index.json" "gs://${{ env.FINAL_MEDIA_BUCKET }}/gallery-index.json" \
            --content-type="application/json" \
            --cache-control="public,max-age=300"
