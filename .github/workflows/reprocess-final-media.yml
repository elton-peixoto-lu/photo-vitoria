name: Reprocess Final Media Watermark

on:
  push:
    branches: [master]
    paths:
      - 'assets/watermark-logo.png'
      - 'backend/**'
      - 'scripts/reprocessPublishedGalleryWatermark.mjs'
      - '.github/workflows/deploy-image-worker.yml'
      - '.github/workflows/reprocess-final-media.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE_WORKER_URL: https://photo-vitoria-image-worker-rxpgnk6khq-uc.a.run.app

jobs:
  reprocess-media:
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.IMAGE_WORKER_URL }}
          id_token_include_email: true

      - name: Wait for worker deployment to be ready
        run: |
          for attempt in $(seq 1 40); do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.IMAGE_WORKER_URL }}/health")
            if [ "$status_code" = "200" ]; then
              echo "Worker respondeu healthz."
              exit 0
            fi
            echo "Aguardando worker ficar pronto (tentativa $attempt)..."
            sleep 15
          done
          echo "Worker nao ficou pronto a tempo."
          exit 1

      - name: Trigger final media reprocess
        run: |
          for attempt in $(seq 1 30); do
            response="$(curl -sS -w '\n%{http_code}' \
              -X POST "${{ env.IMAGE_WORKER_URL }}/reprocess-published-media" \
              -H "Authorization: Bearer ${{ steps.auth.outputs.id_token }}" \
              -H "Content-Type: application/json" \
              -d '{}')"
            body="$(printf '%s' "$response" | sed '$d')"
            status_code="$(printf '%s' "$response" | tail -n1)"
            printf '%s\n' "$body"
            if [ "$status_code" = "200" ]; then
              exit 0
            fi
            echo "Tentativa $attempt falhou com status $status_code. Aguardando nova revisao do worker..."
            sleep 15
          done
          exit 1
