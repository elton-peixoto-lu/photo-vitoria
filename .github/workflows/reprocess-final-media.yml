name: Reprocess Final Media Watermark

on:
  push:
    branches: [master]
    paths:
      - 'assets/watermark-logo.png'
      - 'backend/**'
      - 'scripts/reprocessPublishedGalleryWatermark.mjs'
      - '.github/workflows/deploy-image-worker.yml'
      - '.github/workflows/reprocess-final-media.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_WORKER_URL: ${{ secrets.IMAGE_WORKER_URL }}

jobs:
  reprocess-media:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for matching worker deploy
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: node scripts/waitForWorkerDeploy.mjs "$REPO" "$SHA"

      - name: Wait for worker deployment to be ready
        if: env.IMAGE_WORKER_URL != ''
        run: |
          for attempt in $(seq 1 40); do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.IMAGE_WORKER_URL }}/health")
            if [ "$status_code" = "200" ]; then
              echo "Worker respondeu healthz."
              exit 0
            fi
            echo "Aguardando worker ficar pronto (tentativa $attempt)..."
            sleep 15
          done
          echo "Worker nao ficou pronto a tempo."
          exit 1

      - name: Fail when IMAGE_WORKER_URL secret is missing
        if: env.IMAGE_WORKER_URL == ''
        run: |
          echo "Secret IMAGE_WORKER_URL ausente."
          exit 1

      - name: Trigger final media reprocess
        run: |
          triggered=0
          for attempt in $(seq 1 30); do
            response="$(curl -sS -w '\n%{http_code}' \
              -X POST "${{ env.IMAGE_WORKER_URL }}/reprocess-published-media" \
              -H "Authorization: Bearer ${{ secrets.IMAGE_WORKER_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{}')"
            body="$(printf '%s' "$response" | sed '$d')"
            status_code="$(printf '%s' "$response" | tail -n1)"
            printf '%s\n' "$body"
            if [ "$status_code" = "200" ] || [ "$status_code" = "202" ] || [ "$status_code" = "409" ]; then
              triggered=1
              break
            fi
            echo "Tentativa $attempt falhou com status $status_code. Aguardando nova revisao do worker..."
            sleep 15
          done
          if [ "$triggered" != "1" ]; then
            exit 1
          fi

          node scripts/pollWorkerReprocessStatus.mjs "${{ env.IMAGE_WORKER_URL }}" 480 15
