name: Reprocess Final Media Watermark

on:
  push:
    branches: [master]
    paths:
      - 'assets/watermark-logo.png'
      - 'backend/**'
      - 'scripts/reprocessPublishedGalleryWatermark.mjs'
      - '.github/workflows/deploy-image-worker.yml'
      - '.github/workflows/reprocess-final-media.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_WORKER_URL: https://photo-vitoria-image-worker-rxpgnk6khq-uc.a.run.app

jobs:
  reprocess-media:
    runs-on: ubuntu-latest

    steps:
      - name: Wait for matching worker deploy
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.request

          repo = os.environ["REPO"]
          sha = os.environ["SHA"]
          token = os.environ["GH_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/actions/runs?per_page=50"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "User-Agent": "codex",
          }

          for attempt in range(1, 61):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as response:
                  payload = json.load(response)

              matches = [
                  run for run in payload.get("workflow_runs", [])
                  if run.get("head_sha") == sha and run.get("name") == "Deploy Image Worker to Cloud Run"
              ]

              if matches:
                  run = matches[0]
                  status = run.get("status")
                  conclusion = run.get("conclusion")
                  print(f"worker deploy run {run['id']} -> {status}/{conclusion}")
                  if status == "completed" and conclusion == "success":
                      sys.exit(0)
                  if status == "completed" and conclusion != "success":
                      raise SystemExit(f"worker deploy failed: {conclusion}")
              else:
                  fallback = next(
                      (
                          run for run in payload.get("workflow_runs", [])
                          if run.get("name") == "Deploy Image Worker to Cloud Run"
                          and run.get("status") == "completed"
                          and run.get("conclusion") == "success"
                      ),
                      None,
                  )
                  if fallback:
                      print(
                          "usando ultimo deploy de worker bem-sucedido "
                          f"{fallback['id']} para disparar o reprocess"
                      )
                      sys.exit(0)
                  print("worker deploy run ainda nao apareceu")

              time.sleep(10)

          raise SystemExit("timeout aguardando deploy do worker")
          PY

      - name: Wait for worker deployment to be ready
        run: |
          for attempt in $(seq 1 40); do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.IMAGE_WORKER_URL }}/health")
            if [ "$status_code" = "200" ]; then
              echo "Worker respondeu healthz."
              exit 0
            fi
            echo "Aguardando worker ficar pronto (tentativa $attempt)..."
            sleep 15
          done
          echo "Worker nao ficou pronto a tempo."
          exit 1

      - name: Trigger final media reprocess
        run: |
          triggered=0
          for attempt in $(seq 1 30); do
            response="$(curl -sS -w '\n%{http_code}' \
              -X POST "${{ env.IMAGE_WORKER_URL }}/reprocess-published-media" \
              -H "Authorization: Bearer ${{ secrets.IMAGE_WORKER_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{}')"
            body="$(printf '%s' "$response" | sed '$d')"
            status_code="$(printf '%s' "$response" | tail -n1)"
            printf '%s\n' "$body"
            if [ "$status_code" = "200" ] || [ "$status_code" = "202" ] || [ "$status_code" = "409" ]; then
              triggered=1
              break
            fi
            echo "Tentativa $attempt falhou com status $status_code. Aguardando nova revisao do worker..."
            sleep 15
          done
          if [ "$triggered" != "1" ]; then
            exit 1
          fi

          for attempt in $(seq 1 120); do
            status_json="$(curl -sS "${{ env.IMAGE_WORKER_URL }}/reprocess-status")"
            printf '%s\n' "$status_json"
            if STATUS_JSON="$status_json" python3 - <<'PY'
            import json, os, sys
            payload = json.loads(os.environ["STATUS_JSON"])
            if payload.get("running") is True:
                sys.exit(2)
            if payload.get("last_error"):
                print(payload["last_error"])
                sys.exit(1)
            sys.exit(0)
PY
            then
              exit 0
            fi
            result=$?
            if [ "$result" = "1" ]; then
              exit 1
            fi
            sleep 15
          done
          echo "Timeout aguardando reprocesso finalizar."
          exit 1
