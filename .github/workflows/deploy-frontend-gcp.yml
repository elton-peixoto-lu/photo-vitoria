name: Deploy Frontend to GCP Storage

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/deploy-frontend-gcp.yml'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'vercel.json'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: fotovitoria
  GCS_BUCKET: photo-vitoria-site-prod

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set active GCP project
        run: gcloud config set project ${{ env.PROJECT_ID }}

      - name: Ensure deploy SA has bucket permissions
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_SA="$(gcloud config get-value account)"
          echo "Deploy service account: ${DEPLOY_SA}"
          gcloud storage buckets add-iam-policy-binding gs://${{ env.GCS_BUCKET }} \
            --member="serviceAccount:${DEPLOY_SA}" \
            --role="roles/storage.objectAdmin" \
            --quiet || echo "Sem permissao para auto-grant objectAdmin; seguindo com IAM atual."
          gcloud storage buckets add-iam-policy-binding gs://${{ env.GCS_BUCKET }} \
            --member="serviceAccount:${DEPLOY_SA}" \
            --role="roles/storage.legacyBucketReader" \
            --quiet || echo "Sem permissao para auto-grant legacyBucketReader; seguindo com IAM atual."

      - name: Upload static build to Cloud Storage
        run: gcloud storage rsync ./dist gs://${{ env.GCS_BUCKET }} --recursive --delete-unmatched-destination-objects

      - name: Invalidate Cloud CDN cache
        shell: bash
        env:
          CDN_URL_MAP: ${{ secrets.GCP_CDN_URL_MAP }}
        run: |
          set -euo pipefail
          if [ -z "${CDN_URL_MAP:-}" ]; then
            echo "Secret GCP_CDN_URL_MAP nao configurado; pulando invalidacao de CDN."
            exit 0
          fi
          gcloud compute url-maps invalidate-cdn-cache "${CDN_URL_MAP}" \
            --project "${{ env.PROJECT_ID }}" \
            --path "/*" \
            --async
          echo "Invalidacao de CDN solicitada para ${CDN_URL_MAP}."
