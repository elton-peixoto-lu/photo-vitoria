name: Deploy Image Worker to Cloud Run

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'scripts/processManifestWorker.mjs'
      - 'scripts/processPendingUploads.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.image-worker'
      - '.github/workflows/deploy-image-worker.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: fotovitoria
  REGION: us-central1
  SERVICE_NAME: photo-vitoria-image-worker
  IMAGE_NAME: us-central1-docker.pkg.dev/fotovitoria/photo-vitoria/photo-vitoria-image-worker
  RUNTIME_SERVICE_ACCOUNT: photo-vitoria-admin-api@fotovitoria.iam.gserviceaccount.com
  FINAL_MEDIA_BUCKET: photo-vitoria-gallery-prod

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Select target project
        run: gcloud config set project ${{ env.PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Image Worker
        run: |
          docker build -f Dockerfile.image-worker -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy Image Worker
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --service-account ${{ env.RUNTIME_SERVICE_ACCOUNT }} \
            --allow-unauthenticated \
            --set-env-vars="IMAGE_WORKER_REPO_ROOT=/workspace,IMAGE_WORKER_NODE_BIN=node,IMAGE_WORKER_PROCESS_SCRIPT=/workspace/scripts/processManifestWorker.mjs,WATERMARK_LOGO_PATH=/workspace/assets/watermark-logo.svg,FINAL_MEDIA_BUCKET=${{ env.FINAL_MEDIA_BUCKET }},GALLERY_INDEX_OBJECT=gallery-index.json" \
            --set-secrets="GITHUB_UPLOAD_TOKEN=photo-vitoria-github-upload-token:latest,IMAGE_WORKER_BEARER_TOKEN=photo-vitoria-image-worker-token:latest"
